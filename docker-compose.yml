version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: blog-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blog_platform
      POSTGRES_USER: blog_user
      POSTGRES_PASSWORD: blog_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
